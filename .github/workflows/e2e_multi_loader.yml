name: End-to-End Multi-Loader Tests

on:
 schedule:
   - cron: "0 9 * * 1"
 workflow_dispatch:
 push:
   branches: [main, lenson/workflows-test]
 pull_request:
   branches: [main]

env:
  GOOS: linux
  GO111MODULE: on

jobs:
  test-knative:
    name: Test Multi-Loader with Knative Deployment
    env:
      KIND_VERSION: v0.22.0
      K8S_VERSION: v1.29
      YAML_DIR: workloads/container

    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            trace_func_go,
          ]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: "true"
      - name: Checkout LFS objects
        run: git lfs checkout

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Create k8s Kind Cluster
        run: bash ./scripts/konk-ci/01-kind.sh

      - name: Install Serving
        run: bash ./scripts/konk-ci/02-serving.sh

      - name: Install Kourier
        run: bash ./scripts/konk-ci/02-kourier.sh

      - name: Setup domain and autoscaler
        run: |
          INGRESS_HOST="127.0.0.1"
          KNATIVE_DOMAIN=$INGRESS_HOST.sslip.io
          kubectl patch configmap -n knative-serving config-domain -p "{\"data\": {\"$KNATIVE_DOMAIN\": \"\"}}"
          kubectl patch configmap -n knative-serving config-autoscaler -p "{\"data\": {\"allow-zero-initial-scale\": \"true\"}}"
          kubectl patch configmap -n knative-serving config-features -p "{\"data\": {\"kubernetes.podspec-affinity\": \"enabled\"}}"
          kubectl label node knative-control-plane loader-nodetype=worker

      - name: Build and run multi-loader
        run: go run tools/multi_loader/multi_loader.go --config tools/multi_loader/runner/test_multi_loader_config.json

      - name: Check the output
        run: |
          folder_count=$(find data/out/multi-test/ -mindepth 1 -maxdepth 1 -type d | wc -l)
          if [ "$folder_count" -eq 3 ]; then
            echo "Correct number of folders found"
          else
            echo "Folder count is $folder_count, expected 3"
            exit 1
          fi
          echo "Listing directories in data/out/multi-test/:"
          ls -l data/out/multi-test/
          echo "Listing all folders and sub dir in data/out/multi-test/:"
          find . -type d

      - name: Down
        if: ${{ always() }}
        run: |
          kn service delete --all